<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK Tech - Assistência Técnica</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --light: #f1f5f9;
            --whatsapp-color: #25d366;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light);
            color: var(--dark);
            padding-bottom: 80px;
        }

        header {
            background-color: var(--dark);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            margin: auto;
        }

        .budget-form {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h3 { margin-top: 0; color: var(--primary); }

        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* BOTÃO DE ENVIAR */
        .btn-send {
            width: 100%;
            padding: 15px;
            background-color: var(--whatsapp-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-send:active { transform: scale(0.98); background-color: #1ebc59; }

        /* BOTÃO FLUTUANTE */
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--whatsapp-color);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100;
        }
    </style>
</head>
<body>

    <header>
        <h1>RK Tech</h1>
        <p>Assistência Técnica Especializada</p>
    </header>

    <div class="container">
        <div class="budget-form">
            <h3>Solicitar Orçamento</h3>
            <form id="whatsappForm">
                <label>Seu Nome:</label>
                <input type="text" id="name" placeholder="Ex: Maria Silva" required>

                <label>Modelo do Celular:</label>
                <input type="text" id="model" placeholder="Ex: iPhone 12, Moto G60" required>

                <label>Problema:</label>
                <select id="issue">
                    <option value="Tela Quebrada">Tela Quebrada</option>
                    <option value="Bateria Ruim">Troca de Bateria</option>
                    <option value="Não Carrega">Conector de Carga</option>
                    <option value="Software/Sistemas">Problema de Software</option>
                    <option value="Outro">Outro Defeito</option>
                </select>

                <button type="submit" class="btn-send">
                    <span>Enviar Orçamento</span>
                </button>
            </form>
        </div>
    </div>

    <a href="https://wa.me/5581921426179" target="_blank" class="fab">
        💬
    </a>

    <script>
        document.getElementById('whatsappForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const model = document.getElementById('model').value;
            const issue = document.getElementById('issue').value;
            const phone = "5581921426179";

            const message = `Olá! Me chamo *${name}*.\nGostaria de um orçamento para o meu *${model}*.\nProblema: *${issue}*.\n\nPoderia me ajudar?`;
            
            const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            
            window.open(url, '_blank');
        });
    </script>

</body>
</html>
